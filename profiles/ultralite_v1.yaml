# QVGL profile ultralite_v1 — Qt Quick Ultralite-inspired subset
name: ultralite_v1
version: 1

imports:
  allowed:
    - "QtQuick"
    - "QtQuick 2.0"
    - "QtQuick 2.15"
    - "QtQuick.Controls"
    - "QtQuick.Controls 2.15"
    - "QtQuick.Layouts"
    - "QtQuick.Layouts 1.15"
    - "QtQuick.Controls.Material"
    - "QtQuick.Controls.Material 2.15"

types:
  Item:
    properties: [x, y, width, height, visible, opacity, enabled]
  Rectangle:
    extends: Item
    properties: [color, radius, border.width, border.color]
  Text:
    extends: Item
    properties: [text, color, font.pixelSize, horizontalAlignment]
  Arc:
    extends: Item
    properties: [from, to, value, minValue, maxValue, color, lineWidth, rotation, tickCount, majorTickEvery, showTickLabels]
  Meter:
    extends: Item
    properties: [value, minValue, maxValue, start_angle, end_angle]
  MouseArea:
    extends: Item
    signals: [clicked, pressed, released]
  Image:
    extends: Item
    properties: [source, fillMode]
  ColumnLayout:
    extends: Item
    properties: [spacing]
  RowLayout:
    extends: Item
    properties: [spacing]
  Label:
    extends: Text
    properties: []
  ToolButton:
    extends: Item
    properties: [text, color, font.pixelSize, enabled]
    signals: [clicked]
  Slider:
    extends: Item
    properties: [value, from, to, stepSize]
    signals: [moved, valueChanged, pressed, released]
  Switch:
    extends: Item
    properties: [checked, text]
    signals: [clicked, pressed, released]
  CheckBox:
    extends: Item
    properties: [checked, text, color, font.pixelSize]
    signals: [clicked, pressed, released]
  Button:
    extends: Item
    properties: [text, color, font.pixelSize, enabled]
    signals: [clicked, pressed, released]
  ComboBox:
    extends: Item
    properties: [model, currentIndex, font.pixelSize]
    signals: [activated, pressed, released]
  ProgressBar:
    extends: Item
    properties: [value, from, to]
    signals: []
  RadioButton:
    extends: Item
    properties: [checked, text, color, font.pixelSize]
    signals: [clicked, pressed, released]
  GroupBox:
    extends: Item
    properties: [title, color, font.pixelSize]
    signals: []
  LinePlot:
    extends: Item
    properties: [lineColor, plotBg, gridColor, axisColor, labelColor, unitMutedColor, gridDiv, xMin, xMax, yMin, yMax, padL, padR, padT, padB, xUnit, yUnit, hoverEnabled]
  PlotPoint:
    properties: [x, y]
  NumberAnimation:
    properties: [duration]

anchors:
  allowed: [fill, centerIn, top, bottom, left, right, horizontalCenter, verticalCenter, margins]

bindings:
  allowed_exprs: [sym, const, add, sub, mul, ternary, map_linear, format]
  disallow: [js_function, arbitrary_call]

animations:
  allowed: [NumberAnimation]

display:
  width: 400
  height: 400

fonts:
  tiers:
    - max_pixel_size: 14
      lv_id: montserrat_14
    - max_pixel_size: 36
      lv_id: montserrat_36
    - max_pixel_size: 9999
      lv_id: montserrat_48

theme:
  # Canonical palette — Theme.* and Material.* resolve here at compile time.
  colors:
    surface: "#1a1a2e"
    foreground: "#e0e0e0"
    accent: "#00d4aa"
    accent_dim: "#505050"
    primary: "#3d5a80"
    secondary: "#888888"
    divider: "#3d3e42"
  aliases:
    background: surface

coverage:
  fail_on_unknown_type: true
  fail_on_unknown_property: true
  warn_on_unsupported: true
