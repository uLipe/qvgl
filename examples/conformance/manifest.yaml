# Machine-checkable conformance tiers — see docs/11-qml-conformance-matrix.md
#
# tier:
#   smoke     — fast CI: qvglc check + emit markers (emit_markers.yaml)
#   pass      — full supported example; check + emit markers
#   partial   — check passes; documented gaps in matrix
#   reference — trim/parity target; check + emit markers
#   reject    — check must fail with expect_code
#
# Emit proof: examples/conformance/emit_markers.yaml (keys = id)

cases:
  - id: mcu_minimal
    qml: examples/mcu_minimal/minimal.qml
    profile: profiles/ultralite_v1.yaml
    tier: smoke

  - id: static_card
    qml: examples/static_card/static_card.qml
    profile: profiles/ultralite_v1.yaml
    tier: smoke

  - id: bound_label
    qml: examples/bound_label/bound_label.qml
    profile: profiles/ultralite_v1.yaml
    tier: smoke

  - id: turbo_gauge
    qml: examples/turbo_gauge/turbo_gauge.qml
