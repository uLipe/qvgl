# Qt Quick (PyQt) vs QVGL/SDL render parity cases
# Only examples renderable by stock QtQuick 2.15 (no Arc, no Theme.* compile tokens).
# See docs/07-proof-of-correctness.md

cases:
  - id: mcu_minimal
    qml: examples/mcu_minimal/minimal.qml
    profile: profiles/ultralite_v1.yaml
    per_channel_tolerance: 12
    max_diff_ratio: 0.03

  - id: static_card
    qml: examples/static_card/static_card.qml
    profile: profiles/ultralite_v1.yaml
    per_channel_tolerance: 12
    max_diff_ratio: 0.04

  - id: icon_row
    qml: examples/icon_row/icon_row.qml
    profile: profiles/ultralite_v1.yaml
    per_channel_tolerance: 16
    max_diff_ratio: 0.06

  - id: line_plot_card
    qml: examples/line_plot_card/line_plot_card.qml
    qt_qml: examples/line_plot_card/line_plot_card_qt.qml
    profile: profiles/ultralite_v1.yaml
    per_channel_tolerance: 20
    max_diff_ratio: 0.10

  - id: channel_plot_trim
    qml: examples/channel_plot_trim/channel_plot_trim.qml
    qt_qml: examples/channel_plot_trim/channel_plot_trim_qt.qml
    profile: profiles/ultralite_v1.yaml
    per_channel_tolerance: 22
    max_diff_ratio: 0.12

# Deferred (not stock QtQuick):
# - turbo_gauge, gauge_ticks, arc_animated — Arc is Ultralite/QVGL emit, not in Qt Quick
# - themed_chip — Theme.* resolved at QVGL compile time
