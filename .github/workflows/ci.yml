name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout LVGL
        uses: actions/checkout@v4
        with:
          repository: lvgl/lvgl
          path: lvgl
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsdl2-dev
          pip install -e ".[test]"

      - name: Proof of correctness
        run: python qvglc/cli.py proof

      - name: Pytest
        env:
          SDL_VIDEODRIVER: dummy
        run: pytest tests/python -q

      - name: C runtime (R1/R2)
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          cmake -B build-ci -S . -DQVGL_LVGL_PATH=lvgl -DQVGL_BUILD_PREVIEW=OFF
          cmake --build build-ci -j"$(nproc)"
          ctest --test-dir build-ci -R 'runtime_' --output-on-failure
