name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout LVGL
        uses: actions/checkout@v4
        with:
          repository: lvgl/lvgl
          path: lvgl
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: qvgl
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsdl2-dev
          pip install -e ".[test]"

      - name: Pytest
        working-directory: qvgl
        env:
          SDL_VIDEODRIVER: dummy
        run: pytest tests/python -q
